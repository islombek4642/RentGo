services:
  # ──────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: rentgo-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-rentgo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - rentgo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # Backend API (Node.js + Express)
  # ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rentgo-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-rentgo}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3001}
      AUTO_DB_INIT: ${AUTO_DB_INIT:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      UPLOAD_PATH: uploads/
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-user123}
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rentgo-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────
  # Admin Panel (Next.js)
  # ──────────────────────────────────────
  admin:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
    container_name: rentgo-admin
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
    depends_on:
      - backend
    networks:
      - rentgo-network

  # ──────────────────────────────────────
  # Nginx (Reverse Proxy + SSL)
  # ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rentgo-nginx
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      backend:
        condition: service_healthy
      admin:
        condition: service_started
    networks:
      - rentgo-network
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────
  # Certbot (Let's Encrypt SSL)
  # ──────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: rentgo-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - nginx
    # Certbot container doesn't run permanently; it executes and exits. 
    # Renewals are handled via a cron job on the host or inside a custom container. 
    # Here we specify a dummy command if we just want it available for manual run, 
    # or let the deploy script handle the initial cert generation.

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local

networks:
  rentgo-network:
    driver: bridge
