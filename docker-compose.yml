services:
  # ──────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: rentgo-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-rentgo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - rentgo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # Backend API (Node.js + Express)
  # ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rentgo-backend
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      UPLOAD_PATH: uploads/
      VIRTUAL_HOST: api.rentgo.uz
      LETSENCRYPT_HOST: api.rentgo.uz
      VIRTUAL_PORT: 3000
    expose:
      - "3000"
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rentgo-network
      - proxy_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────
  # Admin Panel (Next.js)
  # ──────────────────────────────────────
  admin:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: rentgo-admin
    restart: always
    environment:
      NODE_ENV: production
      VIRTUAL_HOST: admin.rentgo.uz
      LETSENCRYPT_HOST: admin.rentgo.uz
      VIRTUAL_PORT: 3000
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - rentgo-network
      - proxy_network

networks:
  rentgo-network:
    driver: bridge
  proxy_network:
    external: true

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local
